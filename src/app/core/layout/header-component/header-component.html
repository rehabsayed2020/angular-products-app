<header class="header">
  <div class="container">
    <!-- Logo -->
    <div class="logo">
      <a [routerLink]="['/products']">MyShop</a>
    </div>

    <!-- Navigation -->
    <!-- <nav [class.active]="menuOpen()">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Products</a></li>
        <li><a href="#">Categories</a></li>
        <li><a href="#">About</a></li>
      </ul>
    </nav> -->

    <!-- Actions -->
    <div class="actions">

      <div class="profile" (click)="toggleProfile()">

  </div>
</header>
